# =============================================================================
# Markdown link check (lychee)
# =============================================================================
#
# Catches rotting cross-references in docs (which are the bulk of this repo)
# without blocking PRs on transient HTTP failures. Runs on schedule plus
# manual trigger; opens a tracking issue when the scheduled run breaks so
# the failure does not get lost in the Actions tab.
#
# Reference: https://github.com/lycheeverse/lychee-action
# =============================================================================
name: Maintenance · Link Check
run-name: >-
  ${{
    github.event_name == 'schedule' && 'docs(link-check): weekly link integrity'
    || github.event_name
  }}

on:
  schedule:
    # Tuesdays 06:00 UTC. Off-peak from CodeQL (Mon 06:00 UTC) and
    # Scorecard (Mon 07:00 UTC).
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          # All flags + the URL exclude list now live in .config/lychee.toml
          # so the same config drives local `lychee` runs and CI.
          args: --config .config/lychee.toml './**/*.md'
          fail: true
          jobSummary: true

      - name: Open issue on broken links
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd  # v5
        with:
          title: "Broken links detected by lychee"
          content-filepath: ./lychee/out.md
          labels: |
            documentation
            broken-link
