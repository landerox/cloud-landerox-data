name: Bug Report
description: Report an issue with the project
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide enough detail to reproduce it.
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the repository is affected?
      options:
        - Documentation
        - CI/CD
        - Shared utilities (`shared/common`)
        - Repository structure/templates
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this issue?
      options:
        - Critical
        - Major
        - Minor
        - Cosmetic
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is expected and what is happening instead?
      placeholder: |
        Expected behavior:
        Actual behavior:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide clear, ordered steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and tool versions.
      placeholder: |
        - OS:
        - Python:
        - uv:
        - just:
  - type: textarea
    id: logs
    attributes:
      label: Logs or Error Output
      description: Paste relevant logs or tracebacks.
      render: shell
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Include extra details, screenshots, or links.
