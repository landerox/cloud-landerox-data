name: Feature Request
description: Suggest an idea for this project
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem and expected value.
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the repository would this affect?
      options:
        - Architecture/docs
        - CI/CD
        - Shared utilities (`shared/common`)
        - Repository structure/templates
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What pain point are you trying to solve?
      placeholder: |
        Current situation:
        Limitation:
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the change you want.
      placeholder: |
        Proposed approach:
        Expected outcome:
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: List alternatives and tradeoffs.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add links, screenshots, or references.
